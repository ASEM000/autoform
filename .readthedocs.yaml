# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    - pip install uv
    - uv sync --extra docs
    - uv run sphinx-build -b html docs docs/_build/html

sphinx:
  configuration: docs/conf.py
